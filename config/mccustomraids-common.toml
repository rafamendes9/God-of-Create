["Custom Raid Settings"]
	#Enable custom raids on Minecolonies
	enableCustomRaids = true
	#Execute configured raid commands (wave end, victory, defeat). Disable on servers that do not trust raid JSON editors.
	enableRaidCommands = true
	#Use MineColonies night-based raid timing (minimum/average nights). When false, uses legacy per-second chance and seconds cooldown.
	useMinecoloniesRaidTiming = true
	#Minimum nights between custom raids. -1 reads from MineColonies server config (default 10).
	# Default: -1
	# Range: -1 ~ 30
	minimumNightsBetweenRaids = -1
	#Average nights between custom raids. -1 reads from MineColonies server config (default 14). Must be greater than minimum when overridden.
	# Default: -1
	# Range: -1 ~ 50
	averageNightsBetweenRaids = -1
	#Legacy timing only: chance per raid tick for a custom raid to occur (1 out of X)
	# Default: 100
	# Range: 1 ~ 1000
	raidChance = 100
	#Legacy timing only: minimum cooldown in seconds between custom raids
	# Default: 300
	# Range: 0 ~ 36000
	raidCooldownSeconds = 300
	#Minimum number of entities in a raid
	# Default: 1
	# Range: 1 ~ 10
	minEntitiesPerRaid = 1
	#Maximum number of entities in a raid
	# Default: 3
	# Range: 1 ~ 10
	maxEntitiesPerRaid = 3
	#Radius in blocks around the colony used for raid boss bar visibility
	# Default: 128
	# Range: 16 ~ 1024
	raidBossBarRadiusBlocks = 128
	#Maximum raid boss bar lifetime in seconds
	# Default: 1200
	# Range: 60 ~ 7200
	raidBossBarMaxDurationSeconds = 1200
	#How often raid mobs are guided toward the colony, in ticks
	# Default: 40
	# Range: 5 ~ 200
	raidGuidanceIntervalTicks = 40
	#Radius in blocks used when searching for fallback raid spawn positions
	# Default: 64
	# Range: 16 ~ 512
	raidSpawnSearchRadiusBlocks = 64
	#Random offset radius in blocks around the selected raid center for spawning entities
	# Default: 40
	# Range: 4 ~ 256
	raidSpawnOffsetRadiusBlocks = 40
	#Fallback colony radius in blocks when MineColonies radius cannot be resolved
	# Default: 128
	# Range: 16 ~ 1024
	raidVisibilityFallbackRadiusBlocks = 128
	#Extra visibility margin in blocks added to the estimated colony radius
	# Default: 48
	# Range: 0 ~ 256
	raidVisibilityMarginBlocks = 48
	#Multiplier for raid entity stats (health, damage, etc)
	# Default: 1.5
	# Range: 0.5 ~ 5.0
	raidDifficultyMultiplier = 1.5
