#Enable the schematic upload feature
enabled = true
#Automatically upload schematics when saved (if false, a confirmation screen is shown)
autoUpload = true
#Base URL for the createmod.com API
baseUrl = "https://createmod.com"
#Render 360° rotation view (disable for faster uploads with only 4 featured angles)
render360 = true
#Number of frames in the 360° rotation view (default 120, min 4)
# Default: 120
# Range: 4 ~ 720
frameCount = 120
#Aspect ratio for rendered images (e.g. '16:9', '4:3', '1:1')
aspectRatio = "16:9"
#Override image width in pixels (0 = automatic based on schematic size and aspect ratio)
# Default: 0
# Range: 0 ~ 4096
overrideWidth = 0
#Override image height in pixels (0 = automatic based on schematic size)
# Default: 0
# Range: 0 ~ 4096
overrideHeight = 0
#Save the 4 featured perspective images locally to the schematics folder
saveFeaturedFrames = false
#Save all rotation frames locally to the schematics folder
saveAllFrames = false
#Image format for rendered frames: 'jpeg' (smaller files, recommended) or 'png' (lossless)
imageFormat = "jpeg"
#Show a clickable chat prompt before uploading or generating screenshots (if false, proceeds automatically)
promptBeforeUpload = true
