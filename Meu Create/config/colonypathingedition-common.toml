["Module Opener #模块特性开关#"]
	#Open the module to use the remastered eating AI system (default: true)
	# 开启此模块将会启用重制的市民进食AI (默认开启)
	enableNewEatingModule = true
	#Open the module to use the remastered flee AI system (default: true)
	# 开启此模块将会启用重制的市民逃跑AI (默认开启)
	enableNewFleeModule = true
	#Open the module to use the remastered smeltery AI system for chef and stone smeltery(default: true)
	# 开启此模块将会启用重制的厨师和冶炼工人AI (默认开启)
	enableNewSmelteryModule = true
	#Open the module to use the remastered farmer AI system (default: true)
	# 开启此模块将会启用重制的农夫AI (默认开启)
	enableNewFarmerModule = true
	#Open the module to use the remastered deliveryman AI system (default: true)
	# 开启此模块将会启用重制的快递员AI (默认开启)
	enableNewDeliverymanModule = true

["Building Module Opener #房屋模块特性开关#"]
	#Open this to assign visitors directly trough tavern block (default: true)
	# 开启这个可以直接在酒馆雇佣游客(默认开启)
	enableTavernAssignmentModule = true
	#Open this to add minimum stock module to most of huts (default: true)
	# 开启这个可以直接在酒馆雇佣游客 (默认开启)
	additionalMinimumStockModule = true
	#Open this to add food black list to specific huts, you can edit exactly what workers won't eat at those huts(default: true)
	# 开启这个可以给某几个特定的小屋增加员工禁食清单，这样员工就不会取食你所选定的食物 (默认开启)
	foodBlackListModule = true

["Easycolony Feature #简易殖民地相关特性开关#"]
	#Is citizen alert when get hurt? (default: true)
	# 市民是否警告玩家自己受伤？(默认开启)
	messageDisplay = true

	["Easycolony Feature #简易殖民地相关特性开关#"."Resurrect #复活配置"]
		#是否允许玩家手动复活市民：如果允许，玩家将可以使用指定物品复活市民，成功率取决于总幸福度和墓地等级。
		allow_resurrect = true
		#复活市民所需物品：指定玩家复活市民所需的物品。
		resurrect_item = "minecraft:totem_of_undying"
		#复活市民几率乘数：会在原有的复活概率基础上额外乘以一个系数。
		# Default: 1.0
		# Range: 0.0 ~ 2.147483647E9
		resurrect_chance_multiplier = 1.0

	["Easycolony Feature #简易殖民地相关特性开关#"."Mind Reader #市民思维读取器设置"]
		#是否允许玩家读取市民行动：如果允许，玩家将可以手持特定物品右键市民读取市民当前行动。
		allow_read_mind = true
		#读取行动所需物品：指定玩家读取市民行动所需的物品，不会消耗。
		read_mind_item = "minecraft:compass"

["Update Message Display #更新信息显示#"]
	#Is changelogs display in-game when new version updated? (default: true)
	# 是否在游戏内部显示最新版本更新信息？(默认开启)
	messageDisplay = false

	["Pathing Cost Modifier #寻路Cost相关设置#"."Multiplier #乘子系数#"]
		#Rail path cost multiplier (default: 0.1, original:0.1) #铁轨Cost乘数 (默认 : 0.1 殖民地原设置 : 0.1)#
		# Default: 0.1
		# Range: 0.0 ~ 2.0
		railCostMultiplier = 0.1
		#Road path cost multiplier (default: 0.25, original:1/6) #路径Cost乘数 (默认 : 0.4 殖民地原设置 : 1/6)#
		# Default: 0.25
		# Range: 0.0 ~ 2.0
		roadCostMultiplier = 0.25
		#Drop cost multiplier (default: 1.0, original:1.0)
		##掉落Cost乘数 (默认 : 1.0 殖民地原设置 : 1.0)#
		#Notice: The base formula for falling cost has been modified from |dY|³ to |dY| ^ 4.
		##注意:下落Cost基础公式已经从 |dY|³ 修改为 |dY| ^ 4 #
		# Default: 1.0
		# Range: 0.0 ~ 10.0
		dropCostMultiplier = 1.0

	["Pathing Cost Modifier #寻路Cost相关设置#"."Basic Cost Definer #基础Cost定义#"]
		#Water path cost addon (default: 12.0, original:2.0) #水路Cost (默认 : 12.0 殖民地原设置 : 2.0)#
		# Default: 12.0
		# Range: 0.0 ~ 63.0
		waterCostAddon = 12.0
		#Jump cost addon (default: 4.0, original:2.0) #跳跃(准确来说是非梯子爬升)Cost (默认 : 4.0 殖民地原设置 : 2.0)#
		# Default: 4.0
		# Range: 0.0 ~ 63.0
		jumpCostAddon = 4.0
		#In shape cost addon (default: 2.0, original:2.0) #实体方块内部行走的Cost (默认 : 2.0 殖民地原设置 : 2.0)#
		# Default: 2.0
		# Range: 0.0 ~ 63.0
		inShapeCostAddon = 2.0
		#Door and trapdoor’s cost addon (default: 3.0, original:3.0) #穿过各种"门"的Cost (默认 : 3.0 殖民地原设置 : 3.0)#
		# Default: 3.0
		# Range: 0.0 ~ 63.0
		doorsCostAddon = 3.0
		#Dive cost addon (default: 48.0, original:4.0) #潜水(潜多了会淹死)的Cost (默认 : 48.0 殖民地原设置 : 4.0)#
		# Default: 48.0
		# Range: 0.0 ~ 63.0
		diveCostAddon = 48.0
		#Breathing cave air cost addon (default: 0.3, original:3.0) #钻洞(人工的也算)的Cost,(默认 : 0.3 殖民地原设置 : 3.0)#
		# Default: 0.3
		# Range: 0.0 ~ 63.0
		caveCostAddon = 0.3
		#Exit railway cost addon (default: 4.0, original:4.0) #下铁路(人工的也算)的Cost(探测铁轨为”站点“，不计cost) (默认 : 4.0 殖民地原设置 : 4.0)#
		# Default: 4.0
		# Range: 0.0 ~ 63.0
		railExitAddon = 4.0

	["Pathing Cost Modifier #寻路Cost相关设置#"."Typical Cost Definer #针对性Cost定义#"]
		#Cost on switch ladder when climbing (default: 18.0) #攀爬时切换梯子的Cost (默认 : 18.0)#
		# Default: 18.0
		# Range: 0.0 ~ 63.0
		ladderSwitchCostAddon = 18.0
		#Walk on shingle cost addon (default: 6.0, original:3.0) #上房揭瓦(走在屋瓦上)的Cost (默认 : 6.0 殖民地原设置 : 3.0)#
		# Default: 6.0
		# Range: 0.0 ~ 63.0
		shingleCostAddon = 6.0
		#Jump in farmland or drop onto farmland cost addon (default: 24.0) #在农田中跳上跳下的Cost (默认 : 24.0)#
		# Default: 24.0
		# Range: 0.0 ~ 63.0
		farmlandCostAddon = 24.0
		#Walk on leaves cost addon (default: 8.0) #爬树(走在树叶上)的Cost (默认 : 8.0)#
		# Default: 8.0
		# Range: 0.0 ~ 63.0
		leafCostAddon = 8.0
		#Walk in sweet berry bush cost addon (default: 63.0) #被浆果丛扎的Cost (默认 : 63.0)#
		# Default: 63.0
		# Range: 0.0 ~ 63.0
		berryCostAddon = 63.0

	["Pathing Cost Modifier #寻路Cost相关设置#"."Advanced Pathfinding Constant Definer #进阶寻路算法常数定义(警告：慎重修改！会对全局寻路产生极大影响！)#"]
		#When traversing callback nodes, there is a heuristic reduction on artificial roads. This value is used to control the rate at which the heuristic for railway callback nodes increases, and its formula is: RAIL_COST_MULTIPLIER * ONRAIL_CALLBACK_MULTIPLIER (default: 1.0) 
		#走回头路(其节点暂定义为回扣节点)时在人工道路上会有启发值减免,这是用来控制铁路回扣节点启发值增加速度的数值，其算式为 RAIL_COST_MULTIPLIER * ONRAIL_CALLBACK_MULTIPLIER (默认 : 1.0)
		# Default: 1.0
		# Range: 0.0 ~ 2.0
		onRailCallbackMutiplier = 1.0
		#This value is used to control the rate at which the heuristic for callback nodes on road blocks increases, and its formula is: ROAD_COST_MULTIPLIER * ONROAD_CALLBACK_MULTIPLIER (default: 1.2) 
		#用来控制道路方块上回扣节点启发值增加速度的数值，其算式为 ROAD_COST_MULTIPLIER * ONROAD_CALLBACK_MULTIPLIER (默认 : 1.2)
		# Default: 1.2
		# Range: 0.0 ~ 2.0
		onRoadCallbackMutiplier = 1.2
		#This is a global heuristic reduction, representing how much villagers prefer railways when pathfinding far away from the target point. The smaller the value, the stronger the preference. (default: 0.5)
		#是一个全局的启发值减免，表现为村民在远离目标点处寻路时对铁路的信任程度，数值越小越信任(默认 : 0.5)
		# Default: 0.5
		# Range: 0.1 ~ 3.0
		onRailPreference = 0.5
		#This is a global heuristic reduction, representing how much villagers prefer path blocks when pathfinding far away from the target point. The smaller the value, the stronger the preference. (default: 0.78)
		#是一个全局的启发值减免，表现为村民在远离目标点处寻路时对道路方块的信任程度，数值越小越信任(默认 : 0.78)
		# Default: 0.78
		# Range: 0.4 ~ 3.0
		onRoadPreference = 0.78
		#This is a global heuristic multiplier, representing how much villagers prefer swimming when pathfinding far away from the target point. The smaller the value, the stronger the preference. (default: 1.3)
		#是一个全局的启发值乘子，表现为村民在远离目标点处寻路时对水路的信任程度，数值越小越信任(默认 : 1.6)
		# Default: 1.6
		# Range: 1.0 ~ 8.0
		swimmingPreference = 1.6
		#Tolerates how many times callback nodes can be expanded during each pathfinding process. (default: 2)
		# 能容忍每次寻路中回扣节点被扩展几次，数值过大可能会造成扩展的无用节点增加 (默认 : 2)
		# Default: 2
		# Range: 1 ~ 25
		callbackTimesTolerance = 2
		#Explore the "cheapest" X nodes at every step. (default: 4)
		# 每一步寻路时探索最优的 X 个节点 (默认 : 4)
		# Default: 4
		# Range: 1 ~ 25
		nodeExtendCount = 4

["Restaurant Related Modifier #餐厅相关逻辑修改#"]
	#Duration citizens wait in the restaurant for cook service (minutes) (default: 0.5, original: 2.0)
	#你的村民在餐厅等待厨师服务的时间(分钟) (默认 : 0.5 殖民地原设置 : 2.0)
	# Default: 0.5
	# Range: 0.0 ~ 2.0
	restaurantWaitingTime = 0.5

["Hospital Related Modifier #医院相关逻辑修改#"]
	#The percentage of HP at which your citizens will seek treatment. (default: 0.2, original: 0.0)
	#你的村民将在剩多少比例的HP时去寻求医生治疗 (默认 : 0.2 殖民地原设置 : 0.0)
