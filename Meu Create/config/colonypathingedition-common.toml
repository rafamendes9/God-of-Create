["LumberJack Modifier #伐木工相关修改#"]
	#Lumberjcak will start to work only if hut is placed.
	# 伐木工会在放置工作方块后立即开始工作 (功能在后期有些超模，建议仅在前期开启以分担少量工作量)。
	lumberjackWorkWhenUnconstructed = false
	#Lumberjcak will replant without saplings, still consume saplings when have.
	# 伐木工在树苗不足时也会正常补种，但是有树苗时依旧会消耗树苗。
	lumberjackPlantWithoutSaplings = false
	#A toggle for lumberjacks to collect dropped items on trees in a more realistic but less efficient way (break leaves).
	#When disabled, uncollected items will instead be teleported directly to the lumberjack’s feet.
	#让伐木工收集树上的掉落物看起来更合理一些(破坏树叶)，效率相对比较低下，关闭后捡不到的物品会直接传送到伐木工脚下
	lumberjackBreakLeavesToGather = false
	#Time lumberjacks spend gathering a single item. Not recommended to set too long.
	#伐木工等待收集的时间，不过因为目前检测问题不建议时间过长
	# Default: 5
	# Range: 2 ~ 10
	lumberjackGatherWaitingTime = 5

["Builder Mode Modifier #土木人修改#"]
	#Builder mode (default: GIBBON), optional below: 建筑工人模式, (默认: 长臂猿)，可选项如下：
	#NORMAL: Normal mode, authentic. 常规: 默认选项，原汁原味的殖民地体验。
	#FORMALIST: Play as a formalist, jumping up and down on the construction site, but work when they just leave their hut. 形式主义者：像个形式主义者一样在工地上蹿下跳，但是会在离开土木小屋后立即开始工作。
	#SENTRY: Play as a sentry, stand at a stable position to build. 哨兵：像一个哨兵一样，站在工地的固定位置工作。
	#GOD: GOD SHOULD BUILD ANYWHERE THEY WANT. 创世神：神就应该想在哪儿干就在那儿干。
	#GIBBON: Play as a gibbon, jumping up and down with a large building range. 长臂猿：像猿猴一样上蹿下跳，但是只在一定建造范围内工作。
	#Allowed Values: NORMAL, FORMALIST, SENTRY, GOD, GIBBON
	builderMode = "GIBBON"
	#Miner mode (default: GIBBON), available modes are same as builder
	#矿工工作模式, (默认: 长臂猿)，可选模式与建筑工相同
	#Allowed Values: NORMAL, FORMALIST, SENTRY, GOD, GIBBON
	minerMode = "GIBBON"
	#Quarrier mode (default: GIBBON), available modes are same as builder
	#采石工工作模式, (默认: 长臂猿)，可选模式与建筑工相同
	#Allowed Values: NORMAL, FORMALIST, SENTRY, GOD, GIBBON
	quarrierMode = "GIBBON"
	#Building range of gibbon mode. 长臂猿模式下的建造范围。
	# Default: 20
	# Range: 0 ~ 128
	builderGibbonRange = 20
	#Can builder take orders everywhere. 打灰人能否随时随地接单。
	builderTakeOrdersEverywhere = true

["Herder Modifier #养殖户修改#"]
	#Max animal modifier, would you like to modify the max animals to 2^(building level)? (default: false)
	# 养殖场最大生物数是否改为 2^建筑等级 原为 2*建筑等级(动物数目过大会导致卡顿，所以不默认开启),(默认 : false)
	increaceMaxAnimal = false
	#Will butcher kill animals instantly? (default: true)
	# 屠户是否会秒杀动物 (默认 : true)
	butcherInstantKill = true

["Common Citizens Modifier #通用市民修改#"]
	#Open this to enable delivery man eat at warehouse.
	# 开启后快递员将会在仓库吃饭
	deliveryEatAtWareHouse = true
	#Crafters will use its max stock to craft as default, no need research to unlock.
	# 开启后工人会使用库存中余量最多的物品合成，无需点亮对应科技。
	crafterUseMaxStockFirst = true
	#Minimum stock can now be set in item counts rather than in stacks.
	# 开启后，最低存量将按个计数，而不是按组。
	minimumStockPrecise = false
	#Should citizens pick material at their own hut.
	# 你的非快递员市民是否应当在他们的小屋方块处取货。
	pickMaterialAtHut = true
	#Allows workers to use enchanted tools at their current level.
	# 允许工人在工具允许等级时就启用一部分低级附魔工具。
	earlyEnchant = true
	#Controls how many enchantment levels require 1 worker's hut level upgrade.
	# 每升一级可以允许额外附魔等级几级。
	# Default: 2
	# Range: 1 ~ 6
	enchantLevelScale = 2
	#Sets the maximum addtional worker's hut level enchantment tools.
	# 设置附魔工具最多需求小屋增加几级可用。
	# Default: 2
	# Range: 1 ~ 5
	maxAdditionalLevelForEnchantTools = 2
	#Punishment of normal food nutrition for citizens (It's a multiplier) (default: 1, original:0.25)
	#普通食物惩罚乘数 (默认 : 1， 殖民地原设置 : 0.25)
	# Default: 1.0
	# Range: 0.0 ~ 1.0
	foodPunisher = 1.0
	#Bonus of normal food nutrition for citizens (It's a multiplier on saturation) (default: 0.2)
	#普通食物奖励乘数(取决于食物饱和) (默认 : 0.2)
	# Default: 0.2
	# Range: 0.0 ~ 1.0
	normalFoodBonus = 0.2
	#Bonus of minecolonies' food nutrition for citizens (It's a multiplier on saturation) (default: 0.5)
	#殖民地食物奖励乘数(取决于食物饱和) (默认 : 0.5)
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	minecoloniesFoodBonus = 0.5
	#Write In “Foods" that you don‘t want citizen to eat at colonies.
	#写入你不想市民在殖民地中吃的所有食物。
	generalFoodBlackList = []
	#Basic leisure time of citizens (s) (default: 180)
	#市民每次休息的默认时长(秒) (默认 : 0.5)
	# Default: 180
	# Range: 0 ~ 10000
	leisureTime = 180
	#Ratio of start a leisure per second. (Number as the x of 1/x) (default: 3600)
	#市民每秒有多少分之一的概率开始休息 (默认 : 0.5)
	# Default: 3600
	# Range: 1000 ~ 1000000
	leisureRatio = 3600
	#Defines how long would citizen decrease leisure time if their work are pretty “at leisure”, this will multiplied by their homebuilding level. (s) (default: 18)
	#这个时间会在村民空闲时累计，后面抵消它的休闲时间，此处用以控制抵消最大值，此值在实际应用时会乘以其住宅等级 (默认 : 18)
	# Default: 18
	# Range: 0 ~ 10000
	maxPreLeisureTime = 18
	#Open this to enable citizens to get beacon effect. (default: true)
	#开启这个可以让市民获得信标效果 (默认 : 开启)
	beaconEffect = true
	#Open this to disable citizens to teleport to their target when completely stuck. (default: false)
	#开启这个可以禁止市民寻路卡住时直接传送到目标地点 (默认 : 关闭)
	cancelTeleport = false

["Basic Logic Modifier #基础逻辑修改#"]
	#Max pathing distance (default: 1000, original:500)
	# 民最大寻路距离,(默认 : 1000 殖民地原设置 : 500)
	# Default: 1000
	# Range: 500 ~ 4095
	pathingDistance = 1000
	#Should player levite after doing things not allowed in your colony (default : false), 玩家是否会在你殖民地中做不允许的动作后被赋予漂浮buff (default : false)
	cancelLevitation = false
