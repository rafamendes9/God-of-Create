	#The absolute amount of HP at which your citizens will seek treatment. (default: 10.0, original: 6.0)
	#你的村民将在剩多少HP时去寻求医生治疗 (默认 : 10.0 殖民地原设置 : 6.0)
	# Default: 10.0
	# Range: 6.0 ~ 40.0
	cureHP = 10.0
	#Citizen will start to heal themselves at that time.
	# 市民开始自愈的时间(s)
	# Default: 480
	# Range: 0 ~ 4095
	startHeal = 480
	#Citizen will randomly cure during this time.
